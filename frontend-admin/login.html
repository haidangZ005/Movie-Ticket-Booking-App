




<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Admin - CineAdmin</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="./css/login.css">
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="logo">
        <i data-lucide="film" style="width: 32px; height: 32px;"></i>
        CineAdmin
      </div>
      <p>Hệ thống Quản trị Rạp chiếu phim</p>
    </div>

    <!-- Nơi hiển thị lỗi từ Server -->
    <div id="error-alert" class="error-message"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Tài khoản quản trị</label>
        <div class="input-container">
          <i data-lucide="user"></i>
          <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập (VD: admin)" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <div class="input-container">
          <i data-lucide="lock"></i>
          <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu (VD: 123456)" required>
        </div>
      </div>

      <button type="submit" id="btn-submit" class="btn-login">
        Đăng Nhập
      </button>
    </form>
  </div>

  <script src="./js/services/api.js"></script>
  <script src="./js/pages/login.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
