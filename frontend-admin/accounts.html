<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAdmin - Quản lý Tài khoản</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/movies.css"> <!-- Reused Table/Switch CSS -->
  <link rel="stylesheet" href="./css/accounts.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon">
            <i data-lucide="menu"></i>
          </button>
          <h2>Quản lý Người dùng</h2>
        </div>
        <div class="header-right">
           <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=E50914&color=fff" alt="Admin" class="avatar">
            <div class="user-info">
              <span class="user-name">Quản trị viên</span>
              <span class="user-role">Super Admin</span>
            </div>
          </div>
        </div>
      </header>

      <div class="content-wrapper">
        <div class="page-header">
          <h1 class="page-title">Tài khoản Hệ thống</h1>
          <div class="page-actions">
            <button class="btn-primary" onclick="alert('Mở form tạo nhân viên mới')">
              <i data-lucide="user-plus"></i>
              <span>Thêm nhân viên</span>
            </button>
          </div>
        </div>

        <!-- Filters & Search -->
        <div class="accounts-header-filters">
           <div class="search-box">
             <i data-lucide="search"></i>
             <input type="text" class="form-control" id="search-user" placeholder="Tìm theo tên hoặc email...">
           </div>
           
           <div class="filter-group">
              <label style="font-size: 0.85rem; color: var(--text-secondary);">Vai trò:</label>
              <select class="form-control" id="filter-role" style="width: 180px;">
                <option value="all">Tất cả</option>
                <option value="CUSTOMER">Khách hàng</option>
                <option value="STAFF">Nhân viên</option>
                <option value="ADMIN">Quản trị viên</option>
              </select>
           </div>
        </div>

        <!-- Accounts Table -->
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Người dùng</th>
                <th>Vai trò</th>
                <th>Hạng mức</th>
                <th>Ngày tham gia</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="accounts-table-body">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
        
        <div class="pagination-info" style="margin-top: 1.5rem; display: flex; justify-content: space-between; color: var(--text-muted); font-size: 0.85rem;">
          <span>Hiển thị 1 - 10 trên tổng số 1,250 tài khoản</span>
          <div style="display:flex; gap:0.5rem">
            <button class="btn-icon-sub" disabled><i data-lucide="chevron-left"></i></button>
            <button class="btn-icon-sub"><i data-lucide="chevron-right"></i></button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="./js/services/api.js"></script>
  <script src="./js/components/sidebar.js"></script>
  <script src="./js/components/header.js"></script>
  <script src="./js/pages/accounts.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
 Joseph
