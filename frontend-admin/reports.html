<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAdmin - Báo cáo & Thống kê</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/reports.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon">
            <i data-lucide="menu"></i>
          </button>
          <h2>Báo cáo Kinh doanh</h2>
        </div>
        <div class="header-right">
          <button class="btn-secondary" id="btn-export">
            <i data-lucide="download"></i> Xuất Báo Cáo
          </button>
        </div>
      </header>

      <div class="content-wrapper">
        <!-- Filter Bar -->
        <div class="reports-filter-bar">
          <div style="display:flex; gap: 2rem; align-items:center;">
             <div class="form-group" style="margin-bottom:0">
               <label style="margin-bottom:0">Từ ngày</label>
               <input type="date" class="form-control" value="2026-04-01">
             </div>
             <div class="form-group" style="margin-bottom:0">
               <label style="margin-bottom:0">Đến ngày</label>
               <input type="date" class="form-control" value="2026-04-20">
             </div>
             <div class="form-group" style="margin-bottom:0">
               <label style="margin-bottom:0">Chọn rạp</label>
               <select class="form-control">
                 <option>Tất cả cụm rạp</option>
                 <option>CineAdmin Metropolis</option>
                 <option>CineAdmin Landmark 81</option>
               </select>
             </div>
          </div>
          <button class="btn-primary">Áp dụng bộ lọc</button>
        </div>

        <div class="reports-grid">
          <!-- Metrics Row -->
          <div class="metrics-row">
            <div class="metric-card">
              <div class="metric-label">Tổng doanh thu</div>
              <div class="metric-value">1.250.000k</div>
              <div class="metric-footer text-success">
                <i data-lucide="trending-up" style="width:14px; vertical-align:middle"></i> +12% vs tháng trước
              </div>
            </div>
            <div class="metric-card">
              <div class="metric-label">Số vé đã bán</div>
              <div class="metric-value">15.420</div>
              <div class="metric-footer text-success">
                <i data-lucide="trending-up" style="width:14px; vertical-align:middle"></i> +8.5% vs tháng trước
              </div>
            </div>
            <div class="metric-card">
              <div class="metric-label">Giá vé Tb</div>
              <div class="metric-value">81.000 ₫</div>
              <div class="metric-footer text-secondary">Ổn định</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">Tỷ lệ lấp đầy</div>
              <div class="metric-value">68%</div>
              <div class="metric-footer text-danger">
                <i data-lucide="trending-down" style="width:14px; vertical-align:middle"></i> -3% vs tháng trước
              </div>
            </div>
          </div>

          <!-- Charts Row 1: Line and Pie -->
          <div class="charts-main-grid">
            <div class="report-card">
              <div class="report-card-header">
                <h3>Biểu đồ Doanh thu (VND)</h3>
              </div>
              <div class="chart-container">
                <canvas id="revenueReportChart"></canvas>
              </div>
            </div>
            <div class="report-card">
              <div class="report-card-header">
                <h3>Thị phần Doanh thu theo Rạp</h3>
              </div>
              <div class="chart-container">
                <canvas id="marketShareChart"></canvas>
              </div>
            </div>
          </div>

          <!-- Charts Row 2: Bar and Table -->
          <div class="charts-bottom-row">
             <div class="report-card">
                <div class="report-card-header">
                  <h3>Top phim ăn khách</h3>
                </div>
                <div class="chart-container">
                  <canvas id="topMoviesChart"></canvas>
                </div>
             </div>
             <div class="report-card">
                <div class="report-card-header">
                  <h3>Số lượng khách hàng mới</h3>
                </div>
                <div class="chart-container">
                  <canvas id="newUsersChart"></canvas>
                </div>
             </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="./js/services/api.js"></script>
  <script src="./js/components/sidebar.js"></script>
  <script src="./js/components/header.js"></script>
  <script src="./js/pages/reports.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
 Joseph
