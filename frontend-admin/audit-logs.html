<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAdmin - Nhật Ký Hệ Thống</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/movies.css"> <!-- Reused Table/Badge CSS -->
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* Specific styling for Audit Logs */
    .audit-header {
      background-color: rgba(229, 9, 20, 0.05);
      border: 1px solid var(--color-primary);
      border-radius: var(--border-radius-md);
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--color-primary);
    }

    .log-type-tag {
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .tag-create { background-color: rgba(46, 204, 113, 0.2); color: #2ecc71; }
    .tag-update { background-color: rgba(52, 152, 219, 0.2); color: #3498db; }
    .tag-delete { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; }
    .tag-auth { background-color: rgba(155, 89, 182, 0.2); color: #9b59b6; }

    .json-snapshot {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      color: var(--text-secondary);
      background-color: var(--bg-dark);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .ip-address {
      font-family: monospace;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon">
            <i data-lucide="menu"></i>
          </button>
          <h2>Audit Logs</h2>
        </div>
        <div class="header-right">
           <button class="btn-secondary" onclick="alert('Tính năng xuất CSV đang được chuẩn bị')">
             <i data-lucide="file-spreadsheet"></i> Xuất CSV
           </button>
        </div>
      </header>

      <div class="content-wrapper">
        <div class="audit-header">
          <i data-lucide="shield-alert"></i>
          <div>
            <strong>Khu vực giới hạn:</strong> Chỉ SUPER_ADMIN mới có quyền xem nhật ký thao tác chi tiết và Snapshot dữ liệu.
          </div>
        </div>

        <div class="page-header">
          <h1 class="page-title">Nhật ký Thao tác</h1>
          <div class="page-actions">
             <div style="display:flex; gap:1rem">
                <input type="date" class="form-control" value="2026-04-20">
                <select class="form-control" style="width:150px">
                   <option>Tất cả module</option>
                   <option>Phim</option>
                   <option>Suất chiếu</option>
                   <option>Tài khoản</option>
                   <option>Hệ thống</option>
                </select>
             </div>
          </div>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Thời gian</th>
                <th>Người thực hiện</th>
                <th>Hành động</th>
                <th>Module</th>
                <th>Địa chỉ IP</th>
                <th>Dữ liệu (Snapshot)</th>
              </tr>
            </thead>
            <tbody id="audit-logs-table-body">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>

      </div>
    </main>
  </div>

  <script src="./js/services/api.js"></script>
  <script src="./js/components/sidebar.js"></script>
  <script src="./js/components/header.js"></script>
  <script src="./js/pages/audit-logs.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
 Joseph
